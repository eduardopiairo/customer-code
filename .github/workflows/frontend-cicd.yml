name: frontend-cicd

on:
  push:
    branches:
      - main
      - feature/*
      - fix/*
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-cicd.yml"
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"

